# Suppress banner output to stdout (would corrupt MCP stdio protocol)
quarkus.banner.enabled=false

# Redirect all logs to stderr so stdout stays clean for JSON-RPC
quarkus.log.console.enable=true
quarkus.log.console.stderr=true
quarkus.log.level=WARN

# Build as uber-jar (self-contained, produces *-runner.jar)
quarkus.package.type=uber-jar
